name: Deploy React App to GitHub Pages

on:
  push:
    branches:
      - main   # or master (depends on your repo)

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Deploy to gh-pages
        run: |
          npm install -g gh-pages
          gh-pages -d build
